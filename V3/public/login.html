<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — Scholarly Repository</title>
  <link rel="icon" href="data:," />
  <meta name="description" content="Log in to your Scholarly Repository student author account." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <div class="site-header__inner">
      <a href="index.html" class="site-logo">Scholarly<span>.</span></a>
      <nav class="site-nav">
        <a href="index.html">← Home</a>
        <a href="signup.html">Sign Up</a>
      </nav>
    </div>
  </header>

  <main class="auth-wrap fade-in">
    <div class="auth-card">

      <div class="auth-card__logo">Scholarly<span>.</span></div>
      <p class="auth-card__subtitle">Student Research Repository</p>

      <h2>Welcome back</h2>

      <div class="alert alert--error" id="errorMsg"></div>
      <div class="alert alert--success" id="successMsg"></div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required />
      </div>

      <button class="btn btn--primary" style="width:100%; margin-top:1rem;" id="loginBtn">
        Log In
      </button>

      <!-- Google OAuth -->
      <div style="margin-top:1rem; text-align:center; color:var(--text-muted); font-size:0.875rem;">— or —</div>
      <button class="btn btn--outline" style="width:100%; margin-top:1rem; display:flex; align-items:center; justify-content:center; gap:0.5rem;" id="googleBtn">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.7-6.7C35.8 2.5 30.2 0 24 0 14.6 0 6.6 5.4 2.7 13.3l7.8 6C12.4 13.3 17.8 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 6.9-9.9 6.9-17z"/><path fill="#FBBC05" d="M10.5 28.7A14.6 14.6 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7l-7.8-6A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.6 10.7l7.9-6z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.2 0-11.5-4.2-13.4-9.9l-7.9 6C6.6 42.6 14.6 48 24 48z"/></svg>
        Continue with Google
      </button>

      <p class="auth-switch">
        New author? <a href="signup.html">Create an account</a>
      </p>

    </div>
  </main>

  <footer class="site-footer">
    <p>© 2026 · TIDKE'S CREATION</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module">
    // FIX: use window.supabase (CDN global) — not the variable name which collides
    const SUPABASE_URL  = "https://xpakodbcszobvvbhurmj.supabase.co";
    const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhwYWtvZGJjc3pvYnZ2Ymh1cm1qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyODM3OTYsImV4cCI6MjA5Nzg1OTc5Nn0.ZPxMPFgpMfimv7x5WkK_w6K45W23v7QlmRr4gWuahts";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    // Redirect if already logged in
    const { data: { session } } = await sb.auth.getSession();
    if (session) window.location.href = 'dashboard.html';

    const loginBtn  = document.getElementById('loginBtn');
    const googleBtn = document.getElementById('googleBtn');
    const errorEl   = document.getElementById('errorMsg');

    loginBtn.addEventListener('click', handleLogin);
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });

    googleBtn.addEventListener('click', async () => {
      googleBtn.disabled = true;
      googleBtn.textContent = 'Redirecting…';
      const { error } = await sb.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + '/dashboard.html' }
      });
      if (error) {
        errorEl.textContent = error.message;
        errorEl.classList.add('show');
        googleBtn.disabled = false;
        googleBtn.textContent = 'Continue with Google';
      }
    });

    async function handleLogin() {
      errorEl.classList.remove('show');
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        errorEl.textContent = 'Please enter your email and password.';
        errorEl.classList.add('show');
        return;
      }

      loginBtn.disabled    = true;
      loginBtn.textContent = 'Logging in…';

      try {
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
        window.location.href = 'dashboard.html';
      } catch (err) {
        errorEl.textContent = err.message || 'Login failed. Check your credentials.';
        errorEl.classList.add('show');
        loginBtn.disabled    = false;
        loginBtn.textContent = 'Log In';
      }
    }
  </script>

</body>
</html>
